    <!--Criar uma listenner em javaScript para escutar as variacoes das dimenssoes da pagina e recalcular o espaco ocupados por um objecto
        document.getElementById('div_id').clientWidth;
        -->

    <script>
        window.addEventListener('resize', function (event) {
            // Código a ser executado quando ocorrer o evento 'resize'

            if (event.target.innerWidth < 600)
                console.log('E menor');
            document.querySelector('.video-list').style.height = "100px"; 
            console.log(event.target.innerWidth);

        });
        let listVideos = document.querySelectorAll('.video-list .vid');
        let mainVideo = document.querySelector('.main-video video');
        let title = document.querySelector('.main-video .title');

        listVideos.forEach(video => {
            video.onclick = () => {
                listVideos.forEach(vid => vid.classList.remove('active'));
                video.classList.add('active');
                if (video.classList.contains('active')) {
                    let src = video.children[0].getAttribute('src');
                    mainVideo.src = src;
                    let text = video.children[1].innerHTML;
                    title.innerHTML = text;
                }
            };
        });
    </script>
